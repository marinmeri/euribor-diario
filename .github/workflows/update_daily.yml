name: Actualizar Euribor diario

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests pandas beautifulsoup4

      - name: Ejecutar script
        run: python scripts/update_euribor_diario.py

      - name: Subir cambios al repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add euribor_diario_2026.csv
          git diff --staged --quiet || git commit -m "Auto-update Euribor diario $(date +%Y-%m-%d)"
          git push
